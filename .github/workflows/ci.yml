name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: Typecheck (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04, windows-latest, macos-latest, macos-13]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04, windows-latest, macos-latest, macos-13]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  pack-verify:
    name: Pack & Verify (Node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04, windows-latest, macos-latest, macos-13]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Verify package integrity
        run: node scripts/verify-package.cjs

  termux:
    name: Termux (Android, ${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            qemu: false
          - arch: aarch64
            qemu: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM64
        if: matrix.qemu
        uses: docker/setup-qemu-action@v3

      - name: Run CI in Termux container
        shell: bash
        run: |
          docker run --rm \
            ${{ matrix.qemu && '--platform linux/arm64' || '' }} \
            --privileged \
            --entrypoint /entrypoint_root.sh \
            -v "${{ github.workspace }}:/home/builder/project" \
            -e "HOME=/home/builder" \
            termux/termux-docker:${{ matrix.arch }} \
            bash -c "
              set -e
              chown -R system:system /home/builder/project
              su - system -c '
                set -e
                pkg update -y
                pkg install -y git nodejs-lts
                cd /home/builder/project
                npm ci
                npm run build
                npm test
              '
            "

  publish:
    name: Publish to npm
    needs: [typecheck, test, pack-verify, termux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: Check if version already published
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "@cosmicstack/mercury-agent@$PKG_VERSION" version 2>/dev/null; then
            echo "Version $PKG_VERSION already published — skipping."
            exit 0
          fi
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}